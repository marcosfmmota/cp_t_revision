defaults:
  - dataset: cifarn
  - model: resnet
  - noise_transform: pair_flip
n_runs: 5
seed: 123
cp_revision: true
checkpoint_path: null
synthetic_noise: false
n_classes: 10
revision_loss:
  _target_: cp_t_revision.losses.Reweighting_Revision_Loss
second_step_optimizer_config:
    optimizer: Adam
    args:
      lr: 5e-7
trainer:
  _target_: lightning.Trainer
  max_epochs: 100
  accelerator: "gpu"
  devices: "auto"
# Trainer dedicated to the CP-revision stage so its max_epochs is tuned independently of the base
# training above. Falls back to `trainer` if omitted (see run_experiment._build_trainer).
revision_trainer:
  _target_: lightning.Trainer
  max_epochs: 100
  accelerator: "gpu"
  devices: "auto"
ckpt_strategy: "last"
logger:
  _target_: lightning.pytorch.loggers.CSVLogger
  save_dir: "lightning_logs"
alpha: 0.01
k_points: 1
cp_score: APS
cp_predictor: SplitPredictor
